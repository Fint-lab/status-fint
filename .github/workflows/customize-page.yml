name: Customize Page (Fint)

on:
  workflow_run:
    workflows: ["Setup CI", "Static Site CI", "Uptime CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  inject-css:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Write Fint custom CSS
        run: |
          cat > /tmp/fint-injection.html <<'STYLEEOF'
          <!-- FINT-CUSTOM-STYLE v2 -->
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
          <style>
          :root {
            --fint-bg: #FAFAFA;
            --fint-surface: #FFFFFF;
            --fint-border: #E0E0E0;
            --fint-border-strong: #C9C9C9;
            --fint-text: #171717;
            --fint-text-2: #666666;
            --fint-text-3: #8F8F8F;
            --fint-green: #297A3A;
            --fint-green-bg: #EBFAEB;
            --fint-red: #CB2A2F;
            --fint-amber: #FFB224;
            --fint-radius: 8px;
            --fint-radius-sm: 6px;
            --fint-shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --fint-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0px 2px 4px rgba(0,0,0,0.05);
          }
          html, body {
            background: var(--fint-bg) !important;
            color: var(--fint-text) !important;
            font-family: 'Inter','PPMori','Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            line-height: 1.5;
          }
          footer { display: none !important; }
          nav ul li:not(:first-child) { display: none !important; }
          nav {
            background: var(--fint-surface) !important;
            border-bottom: 1px solid var(--fint-border) !important;
            box-shadow: none !important;
            padding: 0 !important;
            position: sticky;
            top: 0;
            z-index: 10;
          }
          nav > div, nav .container {
            max-width: 1100px !important;
            padding: 14px 24px !important;
            margin: 0 auto !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
          }
          nav a.logo {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            font-weight: 600 !important;
            color: var(--fint-text) !important;
            text-decoration: none !important;
          }
          nav a.logo img {
            width: 28px !important;
            height: 28px !important;
            border-radius: 6px !important;
          }
          nav a.logo div {
            font-size: 16px !important;
            letter-spacing: -0.3px !important;
          }
          nav ul {
            display: flex !important;
            align-items: center !important;
            gap: 4px !important;
            margin: 0 !important;
            padding: 0 !important;
            list-style: none !important;
          }
          nav ul li a {
            display: inline-block !important;
            padding: 6px 12px !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            color: var(--fint-text-2) !important;
            border-radius: 6px !important;
            text-decoration: none !important;
            transition: all 0.15s ease !important;
          }
          nav ul li a[aria-current=page] {
            background: rgba(0,0,0,0.05) !important;
            color: var(--fint-text) !important;
          }
          main.container {
            max-width: 880px !important;
            padding: 56px 24px 80px !important;
            margin: 0 auto !important;
          }
          header {
            margin-bottom: 40px !important;
          }
          header h1 {
            font-size: 32px !important;
            font-weight: 600 !important;
            letter-spacing: -1px !important;
            color: var(--fint-text) !important;
            margin: 0 0 8px !important;
            line-height: 40px !important;
          }
          header p, header p.lead {
            font-size: 16px !important;
            color: var(--fint-text-2) !important;
            margin: 0 !important;
            line-height: 24px !important;
          }
          main section {
            background: var(--fint-surface) !important;
            border-radius: var(--fint-radius) !important;
            border: 1px solid var(--fint-border) !important;
            padding: 16px 20px !important;
            margin-bottom: 8px !important;
            box-shadow: var(--fint-shadow-sm) !important;
            transition: box-shadow 0.15s ease !important;
          }
          main section:hover {
            box-shadow: var(--fint-shadow) !important;
          }
          main section h3, main section h4 {
            font-size: 15px !important;
            font-weight: 500 !important;
            color: var(--fint-text) !important;
            margin: 0 !important;
          }
          main section a {
            color: var(--fint-text) !important;
            text-decoration: none !important;
            font-weight: 500 !important;
          }
          main section a:hover {
            color: var(--fint-text-2) !important;
          }
          .changed {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            margin: 40px 0 16px !important;
            padding: 0 !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
          }
          .changed h2 {
            font-size: 20px !important;
            font-weight: 600 !important;
            letter-spacing: -0.4px !important;
            color: var(--fint-text) !important;
            margin: 0 !important;
          }
          form.r, .f.r {
            display: flex !important;
            gap: 0 !important;
            background: var(--fint-surface) !important;
            border: 1px solid var(--fint-border) !important;
            border-radius: 8px !important;
            padding: 3px !important;
            width: fit-content !important;
            margin: 0 !important;
            box-shadow: var(--fint-shadow-sm) !important;
          }
          form.r > div, .f.r > div { margin: 0 !important; }
          form.r input[type=radio], .f.r input[type=radio] {
            position: absolute !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
          }
          form.r label, .f.r label {
            display: inline-block !important;
            padding: 5px 10px !important;
            font-size: 12px !important;
            font-weight: 500 !important;
            color: var(--fint-text-2) !important;
            background: transparent !important;
            border: none !important;
            border-radius: 5px !important;
            cursor: pointer !important;
            transition: all 0.15s ease !important;
            margin: 0 !important;
          }
          form.r label:hover, .f.r label:hover {
            background: rgba(0,0,0,0.05) !important;
            color: var(--fint-text) !important;
          }
          form.r input[type=radio]:checked + label,
          .f.r input[type=radio]:checked + label {
            background: var(--fint-text) !important;
            color: var(--fint-surface) !important;
          }
          .loading svg circle,
          .loading svg path {
            stroke: var(--fint-text-3) !important;
          }
          .loading {
            padding: 16px 0 !important;
          }
          h2:not(.changed h2) {
            font-size: 18px !important;
            font-weight: 600 !important;
            letter-spacing: -0.3px !important;
            color: var(--fint-text) !important;
            margin: 32px 0 12px !important;
          }
          ::selection {
            background: rgba(114, 227, 173, 0.4);
            color: var(--fint-text);
          }
          @media (max-width: 640px) {
            main.container {
              padding: 32px 16px 48px !important;
            }
            header h1 {
              font-size: 26px !important;
              line-height: 32px !important;
              letter-spacing: -0.5px !important;
            }
            header p, header p.lead {
              font-size: 15px !important;
              line-height: 22px !important;
            }
            nav > div, nav .container {
              padding: 12px 16px !important;
            }
            .changed {
              flex-direction: column !important;
              align-items: flex-start !important;
              gap: 12px !important;
            }
          }
          @media (prefers-color-scheme: dark) {
            :root {
              --fint-bg: #0A0A0A;
              --fint-surface: #171717;
              --fint-border: #2E2E2E;
              --fint-text: #EDEDED;
              --fint-text-2: #A1A1A1;
              --fint-text-3: #707070;
            }
          }
          </style>
          STYLEEOF

      - name: Inject CSS into index.html
        run: |
          python3 <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          with open('/tmp/fint-injection.html', 'r', encoding='utf-8') as f:
              injection = f.read()
          # Strip any prior FINT injection (between markers) so we can re-inject fresh
          import re
          html = re.sub(r'<!-- FINT-CUSTOM-STYLE[^>]*-->.*?</style>', '', html, flags=re.DOTALL)
          # Also remove the old single-line style if present
          html = re.sub(r'<!-- FINT-CUSTOM-STYLE -->\s*<style>[^<]*</style>', '', html)
          html = html.replace('</head>', injection + '</head>', 1)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print('CSS injected (size:', len(injection), 'chars)')
          PYEOF

      - name: Commit & push if changed
        run: |
          git config user.name "Fint-lab"
          git config user.email "webdev@cabinetbruel.fr"
          if ! git diff --quiet; then
            git add index.html
            git commit -m "chore: inject Fint custom CSS"
            git push origin gh-pages
          else
            echo "No changes"
          fi
